    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0a0a0a;
        color: #e4e4e7;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
      }

      .container {
        max-width: 680px;
        width: 100%;
      }

      .subtitle {
        font-size: 0.85rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: #8b8b8b;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 40px;
        letter-spacing: -0.5px;
        color: #ffffff;
      }

      #map {
        width: 100%;
        height: 450px;
        border-radius: 8px;
        margin-bottom: 40px;
      }

      .back-link {
        color: #e4e4e7;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 400;
        padding: 10px 20px;
        border: 1px solid #27272a;
        border-radius: 6px;
        transition: all 0.2s ease;
        letter-spacing: 0.5px;
        display: inline-block;
      }

      .back-link:hover {
        border-color: #52525b;
        background-color: #18181b;
      }

      .leaflet-popup-content-wrapper {
        background: #1a1a1a;
        color: #ffffff;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
      }

      .leaflet-popup-tip {
        background: #1a1a1a;
      }

      .leaflet-popup-content {
        margin: 10px 14px;
        font-size: 0.85rem;
        line-height: 1.4;
      }

      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #ffffff;
        color: #000000;
        padding: 8px 16px;
        z-index: 100;
        text-decoration: none;
      }

      .skip-link:focus {
        top: 0;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.8rem;
        }

        #map {
          height: 350px;
        }
      }
    </style>
    <link rel="stylesheet" href="../assets/css/cookie-consent.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <main id="main-content" class="container">
      <header>
        <p class="subtitle">Exploring the world</p>
        <h1>Travel Map</h1>
      </header>
      <section id="map" aria-label="Interactive travel map"></section>
      <nav>
        <a href="../index.html" class="back-link">← Back Home</a>
      </nav>
    </main>
    <script>
      const map = L.map("map", {
        zoomControl: false,
      }).setView([30, 10], 2);

      L.control.zoom({ position: "bottomright" }).addTo(map);

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
        {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
          subdomains: "abcd",
          maxZoom: 19,
        },
      ).addTo(map);

      async function loadLayers() {
        const res = await fetch(
          "../data/geojson/travel-regions-simplified.geojson",
        );
        const regions = await res.json();

        L.geoJSON(regions, {
          style: {
            color: "#e0a800",
            weight: 1,
            fillColor: "#FFD700",
            fillOpacity: 0.25,
          },
          onEachFeature: function (feature, layer) {
            const p = feature.properties;
            layer.bindPopup(
              `<strong>${p.name}</strong><br>${p.country}<br>${p.point_count} place${p.point_count > 1 ? "s" : ""} visited`,
            );
          },
        }).addTo(map);
      }

      loadLayers();
    </script>
    <div id="cookie-banner">
      <p>
        This site uses cookies for analytics.
        <a href="privacy-policy.html">Privacy Policy</a>
      </p>
      <button type="button" class="accept" onclick="acceptCookies()">
        Accept
      </button>
      <button type="button" class="decline" onclick="declineCookies()">
        Decline
      </button>
    </div>
    <script src="../assets/js/cookie-consent.js"></script>
  </body>
</html>
