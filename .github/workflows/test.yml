name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: JavaScript unit tests
        run: npm run test:js

      - name: HTML validation
        run: npm run test:html

      - name: Accessibility check
        run: npm run test:a11y

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [skatingmap, tracks-to-routes]
    defaults:
      run:
        working-directory: tools/${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Python unit tests
        run: uv run --group dev pytest -v

  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Validate GeoJSON output
        working-directory: tools/skatingmap
        run: uv run --group dev pytest tests/test_geojson_output.py -v
