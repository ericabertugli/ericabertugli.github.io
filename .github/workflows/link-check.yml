name: Link Check

on:
  schedule:
    - cron: "0 14 * * 5" # Every Friday at 14:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Link check
        run: npm run test:links
